# DAR2.cl - nginx.conf
# Reglas SEO para canonicalizacion y limpieza de URLs legacy WordPress.
# El root apunta a /usr/share/nginx/html porque el Dockerfile copia
# el contenido de dist/ directamente al webroot.
#
# Topologia: cliente -> Cloudflare -> Traefik (TLS) -> nginx (HTTP)
# nginx solo ve HTTP en :80. HTTPS lo termina Traefik antes.
# Por eso los redirects hacen "https://" hardcoded, no $scheme.

# ============================================
# Redirect www -> sin www (301 permanent)
# Coolify/Traefik hace 307 por defecto; nginx hace 301 que es
# lo que Google necesita para consolidar senales SEO.
# ============================================
server {
    listen 80;
    server_name www.dar2.cl;
    return 301 https://dar2.cl$request_uri;
}

# ============================================
# Server principal
#
# default_server es CRITICO: sin esto, requests con Host: dar2.cl caen
# en el primer server block (www -> 301) y crean loop infinito en
# toda URL que no sea www literal.
# ============================================
server {
    listen 80 default_server;
    server_name dar2.cl _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresion
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;

    # ============================================
    # Security headers
    # ============================================
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    # CSP basico: ajustar si se agregan analytics u otros scripts externos.
    add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' https: https://w.behold.so; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https: https://*.cdninstagram.com https://*.fbcdn.net; font-src 'self' data: https:; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://www.google.com https://maps.google.com; connect-src 'self' https: https://feeds.behold.so https://w.behold.so; object-src 'none'; base-uri 'self'; form-action 'self' https:; frame-ancestors 'self'; upgrade-insecure-requests" always;

    # ============================================
    # 1. URLs legacy de WordPress -> 410 Gone
    #    Acelera desindexacion en Google.
    # ============================================
    location ~* ^/wp-admin(/|$)    { return 410; }
    location ~* ^/wp-content(/|$)  { return 410; }
    location ~* ^/wp-includes(/|$) { return 410; }
    location = /wp-login.php       { return 410; }
    location = /xmlrpc.php         { return 410; }
    location ~* ^/wp-.*\.php$      { return 410; }

    # ============================================
    # 1b. SPAM del hackeo en Bluehost (hosting anterior) -> 410 Gone
    #     El dominio fue comprometido: Google aun recuerda URLs de
    #     spam (numismatica .html, /products/fonts/) y sitemaps viejos
    #     que ya dan 404. El 410 ("borrado para siempre") acelera la
    #     desindexacion mucho mas que el 404 ("no encontrado, reintenta").
    #
    #     SEGURO: el sitio Astro sirve paginas como /ruta/ (trailing
    #     slash), nunca .html publico. /404.html y /50x.html quedan
    #     protegidos por su location exacta (mayor prioridad que regex).
    # ============================================
    location = /index.html { return 301 https://dar2.cl/; }
    location ^~ /products/  { return 410; }
    location ~* \.html$     { return 410; }

    # ============================================
    # 2. Cache headers
    # ============================================
    # Chunks Astro versionados con hash: 1 ano immutable
    location ^~ /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Imagenes y assets binarios: 1 ano (immutable es seguro porque las
    # imagenes versionadas por Astro tienen hash; las de portafolio/servicios
    # casi nunca cambian, y si cambian se puede invalidar via Cloudflare cache).
    # Incluye AVIF (faltaba antes - PageSpeed reportaba 4h TTL para AVIF).
    location ~* \.(jpg|jpeg|png|webp|avif|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ============================================
    # 3. Trailing slash canonico (301)
    #    /contacto -> https://dar2.cl/contacto/
    #    https:// hardcoded porque nginx ve HTTP (Traefik termina TLS).
    #    No afecta raiz, archivos con extension, ni paths con slash final.
    # ============================================
    location ~ ^(/[^.]*[^/])$ {
        return 301 https://$host$1/;
    }

    # ============================================
    # 4. /sitemap.xml -> /sitemap-manual.xml (301)
    #    Google y otros crawlers buscan /sitemap.xml por defecto.
    #    Redirigimos al sitemap manual que controlamos directamente.
    # ============================================
    location = /sitemap.xml {
        return 301 https://dar2.cl/sitemap-manual.xml;
    }

    # ============================================
    # 5. /.well-known/llms.txt -> /llms.txt (301)
    #    Algunos AI crawlers revisan esta ruta alternativa.
    # ============================================
    location = /.well-known/llms.txt {
        return 301 https://dar2.cl/llms.txt;
    }

    # ============================================
    # 6. /.well-known/security.txt
    # ============================================
    location = /.well-known/security.txt {
        root /usr/share/nginx/html;
        try_files /.well-known/security.txt =404;
    }

    # ============================================
    # 6. Servir archivos estaticos
    # ============================================
    location / {
        try_files $uri $uri.html $uri/index.html $uri/index.htm $uri/ =404;
    }

    # ============================================
    # 5. Error pages
    # Astro genera /404.html con diseno DAR2 (src/pages/404.astro).
    # nginx lo sirve cuando una URL no existe.
    # ============================================
    error_page 404 /404.html;
    location = /404.html { internal; }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { internal; }
}
