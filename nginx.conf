# DAR2.cl - nginx.conf
# Reglas SEO para canonicalizacion y limpieza de URLs legacy WordPress.
# El root apunta a /usr/share/nginx/html porque el Dockerfile copia
# el contenido de dist/ directamente al webroot.

# ============================================
# Redirect www -> sin www (301 permanent)
# Coolify/Traefik hace 307 por defecto; nginx hace 301 que es
# lo que Google necesita para consolidar senales SEO.
# ============================================
server {
    listen 80;
    server_name www.dar2.cl;
    return 301 https://dar2.cl$request_uri;
}

# ============================================
# Server principal
# default_server es CRITICO: sin esto, requests con Host: dar2.cl caen
# en el primer server block (www -> 301) y crean loop infinito.
# ============================================
server {
    listen 80 default_server;
    server_name dar2.cl _;
    root /usr/share/nginx/html;
    index index.html;

    # Compresion
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml application/rss+xml image/svg+xml;

    # ============================================
    # 1. URLs legacy de WordPress -> 410 Gone
    #    Acelera desindexacion en Google.
    # ============================================
    location ~* ^/wp-admin(/|$)    { return 410; }
    location ~* ^/wp-content(/|$)  { return 410; }
    location ~* ^/wp-includes(/|$) { return 410; }
    location = /wp-login.php       { return 410; }
    location = /xmlrpc.php         { return 410; }
    location ~* ^/wp-.*\.php$      { return 410; }

    # ============================================
    # 2. Cache headers
    # ============================================
    # Chunks Astro versionados con hash: 1 ano immutable
    location ^~ /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Imagenes y assets binarios: 1 semana
    location ~* \.(jpg|jpeg|png|webp|gif|svg|ico|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ============================================
    # 3. Trailing slash canonico (301)
    #    /contacto -> /contacto/
    #    No afecta raiz, archivos con extension, ni paths con slash final.
    # ============================================
    location ~ ^(/[^.]*[^/])$ {
        return 301 $1/;
    }

    # ============================================
    # 4. Servir archivos estaticos
    # ============================================
    location / {
        try_files $uri $uri.html $uri/index.html $uri/index.htm $uri/ =404;
    }

    # ============================================
    # 5. Error pages (suprime los errores en el log si no existen 404.html / 50x.html)
    # ============================================
    error_page 404 /404.html;
    location = /404.html { internal; }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { internal; }
}
